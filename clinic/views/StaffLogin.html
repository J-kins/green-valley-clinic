<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Login - Green Valley Clinic</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0A4A7A 0%, #003459 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #00171F;
    }

    .container {
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }

    .login-card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 52, 89, 0.3);
    }

    .logo-section {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #003459 0%, #0A4A7A 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 800;
      font-size: 24px;
      margin: 0 auto 16px;
    }

    .login-card h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #00171F;
    }

    .login-card p {
      font-size: 14px;
      color: #64748B;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: #00171F;
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #E2E8F0;
      border-radius: 12px;
      font-size: 14px;
      font-family: inherit;
      transition: all 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #003459;
      box-shadow: 0 0 0 3px rgba(0, 52, 89, 0.1);
    }

    .remember-forgot {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      margin-bottom: 24px;
    }

    .remember-forgot a {
      color: #003459;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }

    .remember-forgot a:hover {
      color: #0A4A7A;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .checkbox-group input {
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    .btn-login {
      width: 100%;
      padding: 12px 16px;
      background: linear-gradient(135deg, #003459 0%, #0A4A7A 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 16px;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 52, 89, 0.2);
    }

    .btn-login:active {
      transform: scale(0.98);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
      color: #CBD5E1;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: currentColor;
    }

    .divider-text {
      font-size: 12px;
      color: #94A3B8;
    }

    .signup-link {
      text-align: center;
      font-size: 14px;
      color: #64748B;
    }

    .signup-link a {
      color: #003459;
      text-decoration: none;
      font-weight: 700;
      transition: color 0.2s;
    }

    .signup-link a:hover {
      color: #0A4A7A;
    }

    .back-button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: white;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 40px;
      transition: all 0.2s;
    }

    .back-button:hover {
      gap: 12px;
    }

    .warning {
      background: #FEF3C7;
      border: 1px solid #FCD34D;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 20px;
      font-size: 13px;
      color: #92400E;
    }

    @media (max-width: 480px) {
      .login-card {
        padding: 30px 20px;
      }

      .login-card h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="#home" class="back-button">← Back to Home</a>
    
    <div class="login-card">
      <div class="logo-section">
        <div class="logo-icon">GVC</div>
        <h1>Staff Login</h1>
        <p>Access the clinic management system</p>
      </div>

      <div class="warning">
        This portal is for authorized Green Valley Clinic staff only. Unauthorized access is prohibited.
      </div>

      <form id="staffLoginForm" onsubmit="handleStaffLogin(event)">
        <div class="form-group">
          <label for="username">Username</label>
          <input 
            type="text" 
            id="username" 
            placeholder="Enter your staff username" 
            required
          >
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            placeholder="Enter your password" 
            required
          >
        </div>

        <div class="remember-forgot">
          <div class="checkbox-group">
            <input type="checkbox" id="remember" name="remember">
            <label for="remember" style="margin-bottom: 0;">Remember me</label>
          </div>
          <a href="#reset-password">Forgot password?</a>
        </div>

        <button type="submit" class="btn-login">Sign In</button>
      </form>

      <div class="divider">
        <span class="divider-text">New staff member?</span>
      </div>

      <div class="signup-link">
        Request an account? <a href="#staff/signup">Contact your administrator</a>
      </div>
    </div>
  </div>

  <script>
    function handleStaffLogin(event) {
      event.preventDefault();
      console.log('[v0] Staff login form submitted');
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      // Mock staff authentication
      const validStaff = {
        'dr_wilson': { password: 'password123', role: 'doctor', name: 'Dr. Robert Wilson' },
        'dr_patel': { password: 'password123', role: 'doctor', name: 'Dr. Priya Patel' },
        'receptionist_jane': { password: 'password123', role: 'front_desk', name: 'Jane Smith' },
        'admin_user': { password: 'password123', role: 'admin', name: 'Admin User' }
      };

      if (validStaff[username] && validStaff[username].password === password) {
        const staff = validStaff[username];
        localStorage.setItem('gvc_auth_token', 'token_' + Math.random().toString(36).substr(2, 16));
        localStorage.setItem('gvc_user_type', 'staff');
        localStorage.setItem('gvc_staff_role', staff.role);
        localStorage.setItem('gvc_staff_name', staff.name);
        localStorage.setItem('gvc_staff_username', username);

        console.log('[v0] Staff logged in with role:', staff.role);
        // Redirect based on role
        window.location.hash = `#clinic/${staff.role}/dashboard`;
      } else {
        alert('Invalid credentials');
      }
    }
  </script>
</body>
</html>
