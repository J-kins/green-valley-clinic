" cy="488" r="8" fill="#82D1C6"/><rect x="1054" y="454" width="210" height="118" fill="url(#gradPeach)" stroke="#DCE7E4" stroke-width="1" rx="24" ry="24" filter="url(#soft)"/><circle cx="1222" cy="488" r="18" fill="white" stroke="#DCE7E4" stroke-width="1"/><text x="1080" y="510" class="num" text-anchor="start">182</text><text x="1080" y="538" class="body" text-anchor="start">Active patients</text><circle cx="1222" cy="488" r="8" fill="#F3D5CA"/><rect x="1278" y="454" width="210" height="118" fill="url(#gradLav)" stroke="#DCE7E4" stroke-width="1" rx="24" ry="24" filter="url(#soft)"/><circle cx="1446" cy="488" r="18" fill="white" stroke="#DCE7E4" stroke-width="1"/><text x="1304" y="510" class="num" text-anchor="start">8</text><text x="1304" y="538" class="body" text-anchor="start">Doctors on duty</text><circle cx="1446" cy="488" r="8" fill="#DCD3F7"/><rect x="830" y="596" width="658" height="116" fill="white" stroke="#DCE7E4" stroke-width="1" rx="22" ry="22" filter="url(#soft)"/><text x="854" y="632" class="h3" text-anchor="start">Appointments snapshot</text><rect x="850" y="654" width="618" height="42" fill="#F8FCFB" stroke="#DCE7E4" stroke-width="1" rx="14" ry="14"/><text x="864" y="680" class="label" text-anchor="start">Time</text><line x1="1044.6666666666667" y1="654" x2="1044.6666666666667" y2="688" stroke="#DCE7E4" stroke-width="1" stroke-linecap="round"/><text x="1060.6666666666667" y="680" class="label" text-anchor="start">Patient</text><line x1="1241.3333333333335" y1="654" x2="1241.3333333333335" y2="688" stroke="#DCE7E4" stroke-width="1" stroke-linecap="round"/><text x="1257.3333333333335" y="680" class="label" text-anchor="start">Status</text><rect x="48" y="772" width="1504" height="380" fill="white" stroke="#DCE7E4" stroke-width="1" rx="30" ry="30" filter="url(#shadow)"/><text x="78" y="816" class="h3" text-anchor="start">Layout system</text><rect x="78" y="852" width="260" height="260" fill="#EEF6F5" stroke="#DCE7E4" stroke-width="1" rx="26" ry="26"/><rect x="108" y="882" width="200" height="68" fill="url(#gradPrimary)" stroke="#DCE7E4" stroke-width="1" rx="20" ry="20"/><rect x="108" y="972" width="156" height="18" fill="white" stroke="#DCE7E4" stroke-width="1" rx="9" ry="9"/><rect x="108" y="1000" width="156" height="18" fill="white" stroke="#DCE7E4" stroke-width="1" rx="9" ry="9"/><rect x="108" y="1028" width="156" height="18" fill="white" stroke="#DCE7E4" stroke-width="1" rx="9" ry="9"/><rect x="108" y="1056" width="156" height="18" fill="white" stroke="#DCE7E4" stroke-width="1" rx="9" ry="9"/><rect x="108" y="1084" width="156" height="18" fill="white" stroke="#DCE7E4" stroke-width="1" rx="9" ry="9"/><rect x="374" y="852" width="1120" height="86" fill="white" stroke="#DCE7E4" stroke-width="1" rx="24" ry="24"/><text x="404" y="860" class="label" text-anchor="start"></text><rect x="404" y="870" width="340" height="50" fill="white" stroke="#DCE7E4" stroke-width="1" rx="16" ry="16"/><circle cx="426" cy="895.0" r="8" fill="none" stroke="#6B7C82" stroke-width="1"/><line x1="432" y1="901.0" x2="436" y2="905.0" stroke="#6B7C82" stroke-width="2" stroke-linecap="round"/><text x="446" y="900.0" class="small" text-anchor="start">Search the system</text><rect x="374" y="964" width="1120" height="148" fill="#F8FCFB" stroke="#DCE7E4" stroke-width="1" rx="24" ry="24"/><text x="404" y="1002" class="body" text-anchor="start">12-column content area with 24px corners, 24–32px gutters, and soft shadows.</text><text x="404" y="1034" class="small" text-anchor="start">This page is included so Figma import gives you a reusable visual reference for rebuilding components.</text></svg>