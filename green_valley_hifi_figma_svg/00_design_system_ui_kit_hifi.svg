tart">#CDE6D1</text><rect x="1182" y="212" width="140" height="86" fill="#F1C8C6" stroke="#DCE7E4" stroke-width="1" rx="20" ry="20"/><text x="1182" y="324" class="small" text-anchor="start">Danger</text><text x="1182" y="344" class="tiny" text-anchor="start">#F1C8C6</text><rect x="1366" y="212" width="140" height="86" fill="#25363B" stroke="#DCE7E4" stroke-width="1" rx="20" ry="20"/><text x="1366" y="324" class="small" text-anchor="start">Text</text><text x="1366" y="344" class="tiny" text-anchor="start">#25363B</text><rect x="48" y="380" width="720" height="360" fill="white" stroke="#DCE7E4" stroke-width="1" rx="30" ry="30" filter="url(#shadow)"/><text x="78" y="424" class="h3" text-anchor="start">Buttons &amp; Fields</text><rect x="78" y="466" width="180" height="44" fill="url(#gradPrimary)" stroke="#82D1C6" stroke-width="1" rx="16" ry="16" filter="url(#soft)"/><text x="168.0" y="494" class="button" text-anchor="middle">Primary action</text><rect x="278" y="466" width="180" height="44" fill="url(#gradPeach)" stroke="#DCE7E4" stroke-width="1" rx="16" ry="16"/><text x="368.0" y="494" class="buttonLight" text-anchor="middle">Secondary action</text><rect x="478" y="466" width="180" height="44" fill="#2D6D67" stroke="#2D6D67" stroke-width="1" rx="16" ry="16" filter="url(#soft)"/><text x="568.0" y="494" class="whiteBtn" text-anchor="middle">Dark action</text><rect x="78" y="526" width="180" height="44" fill="white" stroke="#DCE7E4" stroke-width="1" rx="16" ry="16"/><text x="168.0" y="554" class="buttonLight" text-anchor="middle">Plain button</text><text x="78" y="602" class="label" text-anchor="start">Input field</text><rect x="78" y="612" width="280" height="56" fill="white" stroke="#DCE7E4" stroke-width="1" rx="16" ry="16"/><text x="96" y="645.0" class="small" text-anchor="start">Placeholder value</text><text x="382" y="602" class="label" text-anchor="start">Search</text><rect x="382" y="612" width="280" height="56" fill="white" stroke="#DCE7E4" stroke-width="1" rx="1