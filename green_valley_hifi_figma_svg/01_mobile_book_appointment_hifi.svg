16" ry="16"/><text x="286.0" y="324" class="chip" text-anchor="middle">Morning</text><rect x="224" y="344" width="124" height="32" fill="#CDB4A8" stroke="#DCE7E4" stroke-width="1" rx="16" ry="16"/><text x="286.0" y="364" class="chip" text-anchor="middle">Afternoon</text><rect x="224" y="384" width="124" height="32" fill="#F7EEE9" stroke="#DCE7E4" stroke-width="1" rx="16" ry="16"/><text x="286.0" y="404" class="chip" text-anchor="middle">Evening</text><rect x="62" y="372" width="306" height="258" fill="white" stroke="#DCE7E4" stroke-width="1" rx="24" ry="24" filter="url(#soft)"/><text x="80" y="402" class="label" text-anchor="start">Patient details</text><text x="82" y="412" class="label" text-anchor="start">Full name</text><rect x="82" y="422" width="266" height="56" fill="white" stroke="#DCE7E4" stroke-width="1" rx="16" ry="16"/><text x="100" y="455.0" class="small" text-anchor="start">Enter full name</text><text x="82" y="488" class="label" text-anchor="start">Phone number</text><rect x="82" y="498" width="266" height="56" fill="white" stroke="#DCE7E4" stroke-width="1" rx="16" ry="16"/><text x="100" y="531.0" class="small" text-anchor="start">+256 7XX XXX XXX</text><text x="82" y="564" class="label" text-anchor="start">Email address</text><rect x="82" y="574" width="266" height="56" fill="white" stroke="#DCE7E4" stroke-width="1" rx="16" ry="16"/><text x="100" y="607.0" class="small" text-anchor="start">name@example.com</text><text x="82" y="654" class="label" text-anchor="start">Notes</text><rect x="82" y="668" width="266" height="74" fill="white" stroke="#DCE7E4" stroke-width="1" rx="16" ry="16"/><text x="100" y="710" class="small" text-anchor="start">Add short note or symptoms</text><rect x="82" y="762" width="266" height="44" fill="url(#gradPrimary)" stroke="#0F2340" stroke-width="1" rx="16" ry="16" filter="url(#soft)"/><text x="215.0" y="790" class="button" text-anchor="middle">Book appointment</text><rect x="62" y="822" width="306" height="52" fill="white" stroke="#DCE7E4" stroke-width="1" rx="22" ry="22" filter="url(#soft)"/><text x="82" y="854" class="label" text-anchor="start"></text><text x="82" y="880" class="small" text-anchor="start">You can edit this later from My Appointments.</text></svg>
