<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Sign Up - Green Valley Clinic</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0A4A7A 0%, #003459 100%);
      min-height: 100vh;
      padding: 40px 20px;
      color: #00171F;
    }

    .container {
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
    }

    .signup-card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 52, 89, 0.3);
    }

    .logo-section {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #003459 0%, #0A4A7A 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 800;
      font-size: 24px;
      margin: 0 auto 16px;
    }

    .signup-card h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #00171F;
    }

    .signup-card p {
      font-size: 14px;
      color: #64748B;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: #00171F;
      margin-bottom: 8px;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #E2E8F0;
      border-radius: 12px;
      font-size: 14px;
      font-family: inherit;
      transition: all 0.2s;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #003459;
      box-shadow: 0 0 0 3px rgba(0, 52, 89, 0.1);
    }

    .checkbox-group {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 24px;
      font-size: 13px;
      color: #64748B;
    }

    .checkbox-group input {
      width: 16px;
      height: 16px;
      margin-top: 2px;
      cursor: pointer;
    }

    .checkbox-group a {
      color: #003459;
      text-decoration: none;
      font-weight: 600;
    }

    .checkbox-group a:hover {
      text-decoration: underline;
    }

    .btn-signup {
      width: 100%;
      padding: 12px 16px;
      background: linear-gradient(135deg, #003459 0%, #0A4A7A 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 16px;
    }

    .btn-signup:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 52, 89, 0.2);
    }

    .btn-signup:active {
      transform: scale(0.98);
    }

    .login-link {
      text-align: center;
      font-size: 14px;
      color: #64748B;
    }

    .login-link a {
      color: #003459;
      text-decoration: none;
      font-weight: 700;
      transition: color 0.2s;
    }

    .login-link a:hover {
      color: #0A4A7A;
    }

    .back-button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: white;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 40px;
      transition: all 0.2s;
    }

    .back-button:hover {
      gap: 12px;
    }

    @media (max-width: 480px) {
      .signup-card {
        padding: 30px 20px;
      }

      .signup-card h1 {
        font-size: 24px;
      }

      .form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="#home" class="back-button">← Back to Home</a>
    
    <div class="signup-card">
      <div class="logo-section">
        <div class="logo-icon">GVC</div>
        <h1>Create Account</h1>
        <p>Join Green Valley Clinic to manage your health</p>
      </div>

      <form id="signupForm" onsubmit="handleSignup(event)">
        <div class="form-row">
          <div class="form-group">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" placeholder="John" required>
          </div>
          <div class="form-group">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" placeholder="Doe" required>
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="john.doe@example.com" required>
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" placeholder="(555) 123-4567" required>
        </div>

        <div class="form-group">
          <label for="dob">Date of Birth</label>
          <input type="date" id="dob" required>
        </div>

        <div class="form-group">
          <label for="gender">Gender</label>
          <select id="gender" required>
            <option value="">Select gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="At least 8 characters" required>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="Re-enter your password" required>
        </div>

        <div class="checkbox-group">
          <input type="checkbox" id="terms" name="terms" required>
          <label for="terms" style="margin: 0;">I agree to the <a href="#terms">Terms of Service</a> and <a href="#privacy">Privacy Policy</a></label>
        </div>

        <button type="submit" class="btn-signup">Create Account</button>
      </form>

      <div class="login-link">
        Already have an account? <a href="#login">Sign in here</a>
      </div>
    </div>
  </div>

  <script>
    function handleSignup(event) {
      event.preventDefault();
      console.log('[v0] Signup form submitted');
      
      const firstName = document.getElementById('firstName').value;
      const lastName = document.getElementById('lastName').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (password !== confirmPassword) {
        alert('Passwords do not match');
        return;
      }

      if (password.length < 8) {
        alert('Password must be at least 8 characters');
        return;
      }

      // Mock registration
      localStorage.setItem('gvc_auth_token', 'token_' + Math.random().toString(36).substr(2, 16));
      localStorage.setItem('gvc_user_type', 'patient');
      localStorage.setItem('gvc_patient_name', `${firstName} ${lastName}`);
      
      window.location.hash = '#patient/dashboard';
    }
  </script>
</body>
</html>
